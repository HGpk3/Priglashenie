services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: wedding-invitation:latest
    container_name: wedding-invitation-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      RSVP_STORAGE_PATH: /app/.data/rsvp-submissions.jsonl
    expose:
      - "3000"
    volumes:
      - rsvp-data:/app/.data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  proxy:
    image: nginx:1.27-alpine
    container_name: wedding-invitation-proxy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-_}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-1m}
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./infra/nginx/templates:/etc/nginx/templates:ro

volumes:
  rsvp-data:
