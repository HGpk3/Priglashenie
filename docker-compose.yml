services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: wedding-invitation:latest
    container_name: wedding-invitation-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      RSVP_STORAGE_PATH: /app/.data/rsvp-submissions.jsonl
    expose:
      - "3000"
    volumes:
      - rsvp-data:/app/.data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "3000:3000/tcp"

volumes:
  rsvp-data:
